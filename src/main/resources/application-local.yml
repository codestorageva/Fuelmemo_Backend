server:
  port: ${SERVER_PORT:9095}

spring:
  application:
    name: ${APP_NAME:fuelMemo}

  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/FuelMemo_DB}
    username: ${DB_USERNAME:postgres}
    password: ${DB_PASSWORD:Admincp01}
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        format_sql: true
    database-platform: org.hibernate.dialect.PostgreSQLDialect


  logging:
    level:
      org.springframework.web: ${LOG_WEB:DEBUG}
      org.hibernate.SQL: ${LOG_SQL:DEBUG}
      org.hibernate.type.descriptor.sql.BasicBinder: ${LOG_BINDER:TRACE}

  batch:
    jdbc:
      initialize-schema: ${BATCH_SCHEMA:always}   # auto-create tables if missing
    job:
      enabled: ${BATCH_JOB:false}                 # allow jobs to run

  servlet:
    multipart:
      max-file-size: ${MAX_FILE_SIZE:50MB}
      max-request-size: ${MAX_REQUEST_SIZE:50MB}

app:
  cors:
    allowed-origins: ${CORS_ALLOWED_ORIGINS:*}